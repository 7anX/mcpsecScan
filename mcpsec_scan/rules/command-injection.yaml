rules:
  - id: mcp-command-injection-shell-true
    message: >-
      User-controlled parameter from MCP tool flows to subprocess with
      shell=True. Attacker can inject arbitrary shell commands.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      subcategory: [vuln]
      owasp_mcp: MCP09
      mcpx_id: MCPX-L3-003
      cia_impact: [C, I, A]
      confidence: HIGH
    mode: taint
    pattern-sources:
      - patterns:
          - pattern: |
              def $FUNC(..., $PARAM, ...):
                  ...
          - focus-metavariable: $PARAM
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: subprocess.run($CMD, ..., shell=True, ...)
              - pattern: subprocess.call($CMD, ..., shell=True, ...)
              - pattern: subprocess.Popen($CMD, ..., shell=True, ...)
              - pattern: subprocess.check_output($CMD, ..., shell=True, ...)
              - pattern: os.system($CMD)
              - pattern: os.popen($CMD)
          - focus-metavariable: $CMD
    pattern-sanitizers:
      - pattern: shlex.quote(...)
      - pattern: shlex.split(...)

  - id: mcp-command-injection-fstring
    message: >-
      User input interpolated into shell command string via f-string.
      Use parameterized commands (subprocess with list args) instead.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      owasp_mcp: MCP09
      mcpx_id: MCPX-L3-003b
      cia_impact: [C, I, A]
      confidence: HIGH
    mode: taint
    pattern-sources:
      - patterns:
          - pattern: |
              def $FUNC(..., $PARAM, ...):
                  ...
          - focus-metavariable: $PARAM
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: subprocess.run(f"...", ..., shell=True, ...)
              - pattern: subprocess.call(f"...", ..., shell=True, ...)
              - pattern: os.system(f"...")
              - pattern: os.popen(f"...")

  # ─── JavaScript / TypeScript ───
  - id: mcp-command-injection-js-exec
    message: >-
      User-controlled parameter flows to child_process exec/spawn.
      Attacker can inject arbitrary shell commands.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: security
      owasp_mcp: MCP09
      mcpx_id: MCPX-L3-003
      cia_impact: [C, I, A]
      confidence: HIGH
    mode: taint
    pattern-sources:
      - pattern: |
          const { ..., $PARAM, ...} = $REQ.params.arguments
      - pattern: |
          const { ..., $PARAM, ...} = request.params.arguments
      - pattern: |
          const { ..., $PARAM, ...} = $ARGS
    pattern-sinks:
      - pattern-either:
          - pattern: exec($CMD, ...)
          - pattern: execSync($CMD, ...)
          - pattern: child_process.exec($CMD, ...)
          - pattern: "spawn($CMD, ..., {shell: true, ...})"
