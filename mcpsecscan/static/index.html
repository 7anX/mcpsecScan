<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mcpsec-scan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen" x-data="scanApp()">

  <!-- Header -->
  <header class="bg-gray-800 border-b border-gray-700 px-6 py-4">
    <div class="flex items-center justify-between max-w-7xl mx-auto">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-green-500 rounded-lg flex items-center justify-center font-bold text-sm">MS</div>
        <h1 class="text-xl font-bold">mcpsec-scan</h1>
        <span class="text-xs bg-gray-700 px-2 py-0.5 rounded" x-text="'v' + info.version"></span>
      </div>
      <div class="flex items-center gap-4">
        <span class="text-sm text-gray-400" x-text="t('subtitle')"></span>
        <button @click="toggleLang()"
                class="text-xs bg-gray-700 hover:bg-gray-600 px-2.5 py-1 rounded transition">
          <span x-text="lang === 'en' ? 'CN' : 'EN'"></span>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto p-6 flex gap-6 flex-col lg:flex-row">

    <!-- Left Panel -->
    <div class="lg:w-[30%] w-full space-y-4">

      <!-- Scan Target -->
      <div class="bg-gray-800 rounded-lg p-5 border border-gray-700">
        <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wide mb-4" x-text="t('scanTarget')"></h2>
        <label class="block text-sm text-gray-400 mb-1" x-text="t('sourcePath')"></label>
        <input type="text" x-model="target"
               :placeholder="t('pathPlaceholder')"
               class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-sm focus:border-green-500 focus:outline-none"
               @keydown.enter="runScan()">

        <div class="mt-4">
          <label class="block text-sm text-gray-400 mb-2" x-text="t('layers')"></label>
          <div class="space-y-1">
            <label class="flex items-center gap-2 text-sm">
              <input type="checkbox" x-model="layers.l1" class="rounded">
              <span x-text="'L1 - ' + t('l1Name')"></span>
            </label>
            <label class="flex items-center gap-2 text-sm">
              <input type="checkbox" x-model="layers.l2" class="rounded">
              <span x-text="'L2 - ' + t('l2Name')"></span>
            </label>
            <label class="flex items-center gap-2 text-sm">
              <input type="checkbox" x-model="layers.l3" class="rounded">
              <span x-text="'L3 - ' + t('l3Name')"></span>
              <span x-show="!info.layers?.l3?.available" class="text-xs text-yellow-500" x-text="t('semgrepRequired')"></span>
            </label>
            <label class="flex items-center gap-2 text-sm">
              <input type="checkbox" x-model="layers.l4" class="rounded">
              <span x-text="'L4 - ' + t('l4Name')"></span>
            </label>
          </div>
        </div>

        <button @click="runScan()"
                :disabled="scanning || !target.trim()"
                class="mt-5 w-full bg-green-600 hover:bg-green-500 disabled:bg-gray-600 disabled:cursor-not-allowed text-white font-medium py-2.5 rounded transition">
          <span x-show="!scanning" x-text="t('scanBtn')"></span>
          <span x-show="scanning" class="flex items-center justify-center gap-2">
            <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
            <span x-text="t('scanning')"></span>
          </span>
        </button>
      </div>

      <!-- AI Triage Config -->
      <div class="bg-gray-800 rounded-lg p-5 border border-gray-700">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wide" x-text="t('aiTriage')"></h2>
          <span x-show="!info.ai_available" class="text-xs text-yellow-500">pip install mcpsecscan[ai]</span>
          <label x-show="info.ai_available" class="flex items-center gap-2 cursor-pointer">
            <div class="relative">
              <input type="checkbox" x-model="ai.enabled" class="sr-only">
              <div :class="ai.enabled ? 'bg-green-600' : 'bg-gray-600'" class="w-8 h-4 rounded-full transition"></div>
              <div :class="ai.enabled ? 'translate-x-4' : 'translate-x-0'" class="absolute top-0.5 left-0.5 w-3 h-3 bg-white rounded-full transition transform"></div>
            </div>
          </label>
        </div>

        <div x-show="info.ai_available && ai.enabled" x-cloak class="space-y-2">
          <div>
            <label class="block text-xs text-gray-400 mb-1" x-text="t('aiModel')"></label>
            <input type="text" x-model="ai.model" placeholder="gpt-4o-mini"
                   class="w-full bg-gray-900 border border-gray-600 rounded px-2 py-1.5 text-xs focus:border-green-500 focus:outline-none">
          </div>
          <div>
            <label class="block text-xs text-gray-400 mb-1" x-text="t('aiUrl')"></label>
            <input type="text" x-model="ai.url" placeholder="https://api.openai.com/v1"
                   class="w-full bg-gray-900 border border-gray-600 rounded px-2 py-1.5 text-xs focus:border-green-500 focus:outline-none">
          </div>
          <div>
            <label class="block text-xs text-gray-400 mb-1" x-text="t('aiKey')"></label>
            <input type="password" x-model="ai.key" placeholder="sk-..."
                   class="w-full bg-gray-900 border border-gray-600 rounded px-2 py-1.5 text-xs focus:border-green-500 focus:outline-none">
          </div>
          <p class="text-xs text-gray-500" x-text="t('aiNote')"></p>
        </div>
      </div>

      <!-- Status -->
      <div class="bg-gray-800 rounded-lg p-5 border border-gray-700">
        <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wide mb-3" x-text="t('status')"></h2>
        <div class="space-y-1 text-xs text-gray-400">
          <template x-for="(layer, key) in info.layers" :key="key">
            <div class="flex justify-between">
              <span x-text="key.toUpperCase() + ' ' + layer.name"></span>
              <span :class="layer.available ? 'text-green-400' : 'text-yellow-500'" x-text="layer.available ? t('ready') : t('na')"></span>
            </div>
          </template>
          <div class="flex justify-between pt-2 border-t border-gray-700 mt-2">
            <span x-text="t('rules')"></span>
            <span class="text-green-400" x-text="info.rules_count + t('filesUnit')"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="lg:w-[70%] w-full space-y-4">

      <!-- Scan Results -->
      <div class="bg-gray-800 rounded-lg border border-gray-700 min-h-[400px]">

        <!-- Empty State -->
        <div x-show="!result && !scanning && !error" class="flex items-center justify-center h-[400px] text-gray-500">
          <div class="text-center">
            <svg class="w-16 h-16 mx-auto mb-4 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
            <p x-text="t('emptyState')"></p>
          </div>
        </div>

        <!-- Error -->
        <div x-show="error" x-cloak class="p-5">
          <div class="bg-red-900/30 border border-red-700 rounded p-4 text-red-300 text-sm" x-text="error"></div>
        </div>

        <!-- Results -->
        <div x-show="result" x-cloak class="p-5 space-y-4">
          <!-- Summary bar -->
          <div class="flex items-center gap-3 flex-wrap">
            <template x-for="sev in ['critical','high','medium','low']">
              <span x-show="result?.summary?.[sev]"
                    :class="{
                      'bg-red-600': sev==='critical',
                      'bg-orange-600': sev==='high',
                      'bg-yellow-600': sev==='medium',
                      'bg-blue-600': sev==='low'
                    }"
                    class="px-2.5 py-0.5 rounded text-xs font-medium text-white">
                <span x-text="result.summary[sev]"></span> <span x-text="t('sev_' + sev)"></span>
              </span>
            </template>
            <span class="text-xs text-gray-500 ml-auto" x-text="t('scanTime') + ': ' + result?.scan_time_ms + 'ms'"></span>
          </div>

          <!-- No findings -->
          <div x-show="result?.total_findings === 0" class="text-center py-10 text-green-400">
            <svg class="w-12 h-12 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            <p class="font-medium" x-text="t('noIssues')"></p>
          </div>

          <!-- Findings List -->
          <div class="space-y-3" x-show="result?.total_findings > 0">
            <template x-for="(f, idx) in result.findings" :key="idx">
              <div class="bg-gray-900 rounded-lg p-4 border border-gray-700">
                <div class="flex items-start gap-3">
                  <span :class="{
                    'bg-red-600': f.severity==='critical',
                    'bg-orange-600': f.severity==='high',
                    'bg-yellow-600': f.severity==='medium',
                    'bg-blue-600': f.severity==='low'
                  }" class="px-2 py-0.5 rounded text-xs font-medium text-white uppercase shrink-0" x-text="t('sev_' + f.severity)"></span>
                  <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-gray-100" x-text="f.title"></p>
                    <div class="flex items-center gap-3 mt-1 text-xs text-gray-400">
                      <span x-text="f.file + ':' + f.line"></span>
                      <span class="bg-gray-700 px-1.5 py-0.5 rounded" x-text="f.layer"></span>
                      <span x-show="f.owasp_mcp" class="text-blue-400" x-text="f.owasp_mcp"></span>
                    </div>
                    <div x-show="f.evidence" class="mt-2 text-xs text-gray-500 bg-gray-800 p-2 rounded font-mono break-all" x-text="f.evidence"></div>
                    <!-- AI verdict badge (shown when triage available) -->
                    <template x-if="getVerdict(f.id)">
                      <div class="mt-2 flex items-start gap-2">
                        <span :class="{
                          'bg-red-900/50 text-red-300 border-red-700': getVerdict(f.id).verdict==='confirmed',
                          'bg-green-900/50 text-green-300 border-green-700': getVerdict(f.id).verdict==='likely_fp',
                          'bg-yellow-900/50 text-yellow-300 border-yellow-700': getVerdict(f.id).verdict==='needs_review'
                        }" class="text-xs px-1.5 py-0.5 rounded border shrink-0" x-text="'🤖 ' + getVerdict(f.id).verdict"></span>
                        <p class="text-xs text-gray-400" x-text="getVerdict(f.id).explanation"></p>
                      </div>
                    </template>
                    <div x-show="f.remediation" class="mt-2 text-xs text-green-400 bg-green-900/10 border border-green-900/30 p-2 rounded" x-text="'Fix: ' + f.remediation"></div>
                  </div>
                </div>
              </div>
            </template>
          </div>

          <!-- Errors -->
          <template x-for="err in result?.errors || []">
            <div class="text-xs text-yellow-500 bg-yellow-900/20 p-2 rounded" x-text="err"></div>
          </template>
        </div>
      </div>

      <!-- AI Triage Panel -->
      <div x-show="result && result.total_findings > 0 && info.ai_available && ai.enabled" x-cloak
           class="bg-gray-800 rounded-lg border border-gray-700 p-5">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wide">🤖 AI Triage</h2>
          <button @click="runAITriage()"
                  :disabled="aiTriaging"
                  class="text-xs bg-purple-700 hover:bg-purple-600 disabled:bg-gray-600 px-3 py-1.5 rounded transition">
            <span x-show="!aiTriaging" x-text="t('runAI')"></span>
            <span x-show="aiTriaging" class="flex items-center gap-1">
              <svg class="animate-spin h-3 w-3" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
              <span x-text="t('analyzing')"></span>
            </span>
          </button>
        </div>

        <!-- AI Error -->
        <div x-show="aiTriage?.error" x-cloak class="bg-red-900/30 border border-red-700 rounded p-3 text-red-300 text-sm mb-3" x-text="aiTriage?.error"></div>

        <!-- AI Summary -->
        <div x-show="aiTriage && !aiTriage.error" x-cloak>
          <div class="flex items-center gap-3 mb-3">
            <span x-text="t('overallRisk') + ':'" class="text-sm text-gray-400"></span>
            <span :class="{
              'text-red-400': ['critical','high'].includes(aiTriage?.risk_level),
              'text-yellow-400': aiTriage?.risk_level==='medium',
              'text-green-400': ['low','safe'].includes(aiTriage?.risk_level)
            }" class="font-bold uppercase text-sm" x-text="aiTriage?.risk_level"></span>
            <span class="text-xs text-gray-500" x-text="'(' + ai.model + ')'"></span>
          </div>
          <p class="text-sm text-gray-300 mb-4" x-text="aiTriage?.summary"></p>

          <!-- No items state -->
          <div x-show="!aiTriage?.items?.length" class="text-xs text-gray-500" x-text="t('noAIItems')"></div>
        </div>

        <!-- Placeholder when not run -->
        <div x-show="!aiTriage && !aiTriaging" class="text-center py-6 text-gray-500 text-sm" x-text="t('aiPlaceholder')"></div>
      </div>

    </div>
  </main>

  <script>
    function scanApp() {
      return {
        target: '',
        layers: { l1: true, l2: true, l3: true, l4: true },
        scanning: false,
        result: null,
        error: null,
        info: { version: '...', layers: {}, rules_count: 0, ai_available: false },
        lang: localStorage.getItem('mcpsec-lang') || 'zh',

        // AI triage
        ai: {
          enabled: false,
          model: localStorage.getItem('mcpsec-ai-model') || 'gpt-4o-mini',
          url: localStorage.getItem('mcpsec-ai-url') || 'https://api.openai.com/v1',
          key: '',
        },
        aiTriage: null,
        aiTriaging: false,
        verdictMap: {},   // finding_id → triage item

        i18n: {
          en: {
            subtitle: 'MCP Server Static Security Scanner',
            scanTarget: 'Scan Target',
            sourcePath: 'Source Path',
            pathPlaceholder: '/path/to/mcp-server or file.py',
            layers: 'Detection Layers',
            l1Name: 'Quick Detection',
            l2Name: 'MCP Structure',
            l3Name: 'Taint Analysis',
            l4Name: 'Desc-Code Mismatch',
            semgrepRequired: '(semgrep required)',
            scanBtn: 'Scan',
            scanning: 'Scanning...',
            status: 'Status',
            ready: 'Ready',
            na: 'N/A',
            rules: 'Rules',
            filesUnit: ' files',
            emptyState: 'Enter a path and click Scan to start',
            noIssues: 'No security issues found',
            scanTime: 'Time',
            sev_critical: 'critical',
            sev_high: 'high',
            sev_medium: 'medium',
            sev_low: 'low',
            aiTriage: 'AI Triage',
            aiModel: 'Model',
            aiUrl: 'API URL',
            aiKey: 'API Key',
            aiNote: 'Key stored in browser session only, never sent to server.',
            runAI: 'Analyze with AI',
            analyzing: 'Analyzing...',
            overallRisk: 'Overall Risk',
            noAIItems: 'No per-finding details returned.',
            aiPlaceholder: 'Click "Analyze with AI" to get risk assessment and attack scenarios.',
          },
          zh: {
            subtitle: 'MCP Server 静态安全扫描器',
            scanTarget: '扫描目标',
            sourcePath: '源码路径',
            pathPlaceholder: '输入目录或文件路径，如 ./my-server/',
            layers: '检测层',
            l1Name: '快速检测',
            l2Name: 'MCP 结构分析',
            l3Name: '污点分析',
            l4Name: '描述-代码一致性',
            semgrepRequired: '(需安装 semgrep)',
            scanBtn: '开始扫描',
            scanning: '扫描中...',
            status: '状态',
            ready: '就绪',
            na: '不可用',
            rules: '规则数',
            filesUnit: ' 个文件',
            emptyState: '输入路径后点击"开始扫描"',
            noIssues: '未发现安全问题',
            scanTime: '耗时',
            sev_critical: '严重',
            sev_high: '高危',
            sev_medium: '中危',
            sev_low: '低危',
            aiTriage: 'AI 风险研判',
            aiModel: '模型名称',
            aiUrl: 'API 地址',
            aiKey: 'API 密钥',
            aiNote: '密钥仅保存在浏览器会话中，不会发送到服务器。',
            runAI: 'AI 分析',
            analyzing: '分析中...',
            overallRisk: '整体风险',
            noAIItems: '未返回逐条判定结果。',
            aiPlaceholder: '点击"AI 分析"获取风险研判和攻击路径解释。',
          }
        },

        t(key) {
          return this.i18n[this.lang]?.[key] || this.i18n['en'][key] || key;
        },

        toggleLang() {
          this.lang = this.lang === 'en' ? 'zh' : 'en';
          localStorage.setItem('mcpsec-lang', this.lang);
        },

        getVerdict(findingId) {
          return this.verdictMap[findingId] || null;
        },

        async init() {
          try {
            const resp = await fetch('/api/info');
            this.info = await resp.json();
          } catch(e) { console.error(e); }
        },

        async runScan() {
          if (!this.target.trim() || this.scanning) return;
          this.scanning = true;
          this.result = null;
          this.aiTriage = null;
          this.verdictMap = {};
          this.error = null;

          const skip = [];
          if (!this.layers.l1) skip.push('l1');
          if (!this.layers.l2) skip.push('l2');
          if (!this.layers.l3) skip.push('l3');
          if (!this.layers.l4) skip.push('l4');

          try {
            const resp = await fetch('/api/scan', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ target: this.target.trim(), skip })
            });
            if (!resp.ok) {
              const err = await resp.json();
              this.error = err.detail || err.error || `HTTP ${resp.status}`;
            } else {
              this.result = await resp.json();
            }
          } catch(e) {
            this.error = this.lang === 'zh' ? '连接失败: ' + e.message : 'Connection failed: ' + e.message;
          } finally {
            this.scanning = false;
          }
        },

        async runAITriage() {
          if (!this.result || !this.result.findings.length || this.aiTriaging) return;
          this.aiTriaging = true;
          this.aiTriage = null;
          this.verdictMap = {};

          // Persist AI config
          localStorage.setItem('mcpsec-ai-model', this.ai.model);
          localStorage.setItem('mcpsec-ai-url', this.ai.url);

          try {
            const resp = await fetch('/api/ai-triage', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                findings: this.result.findings,
                target: this.result.target,
                api_url: this.ai.url,
                api_key: this.ai.key,
                model: this.ai.model,
              })
            });
            const data = await resp.json();
            this.aiTriage = data;
            // Build verdict map for inline display in finding cards
            if (data.items) {
              for (const item of data.items) {
                this.verdictMap[item.finding_id] = item;
              }
            }
          } catch(e) {
            this.aiTriage = { error: 'Request failed: ' + e.message };
          } finally {
            this.aiTriaging = false;
          }
        }
      }
    }
  </script>
</body>
</html>
